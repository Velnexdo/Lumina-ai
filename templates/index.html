<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LuminaAI Ultra</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
let typingSoundCooldown = false;
let currentMood = "neutral";

// 🎧 typing sound (optimized)
function playTypingSound(){
    if(typingSoundCooldown) return;
    typingSoundCooldown = true;

    let audio = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");
    audio.volume = 0.1;
    audio.play().catch(()=>{});

    setTimeout(()=>typingSoundCooldown=false,120);
}

// suggestions
function showSuggestions(){
    let box = document.getElementById("suggestions");
    box.innerHTML="";
    ["Hi","Tell me a joke","What is time","Your name?"].forEach(s=>{
        let b=document.createElement("button");
        b.innerText=s;
        b.onclick=()=>{document.getElementById("message").value=s;};
        box.appendChild(b);
    });
}

// download
function downloadChat(){
    let text = currentChat.map(m=>m.sender+": "+m.text).join("\n");
    let blob = new Blob([text], {type:"text/plain"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="chat.txt";
    a.click();
}

// status
function updateStatus(){
    let s=document.getElementById("status");
    s.innerText = navigator.onLine ? "🟢 Online | Mood: " + currentMood : "🔴 Offline";
}
window.addEventListener("online", updateStatus);
window.addEventListener("offline", updateStatus);

// theme
function loadTheme(){
    let t=localStorage.getItem("theme");
    if(t==="light"){
        document.body.style.background="white";
        document.body.style.color="black";
    }
}
</script>

<style>
body {
margin:0;
font-family:"Segoe UI";
background:#343541;
color:white;
display:flex;
height:100vh;
}

.sidebar {
width:260px;
background:#202123;
padding:10px;
display:flex;
flex-direction:column;
}

.new-chat {
background:#19c37d;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.history {
flex:1;
margin-top:10px;
overflow:auto;
}

.history div {
padding:8px;
background:#2a2b32;
margin-bottom:5px;
border-radius:5px;
cursor:pointer;
}

.main {
flex:1;
display:flex;
flex-direction:column;
}

.header {
padding:12px;
text-align:center;
border-bottom:1px solid #444;
}

.chat-box {
flex:1;
overflow:auto;
padding:20px;
}

.message {
max-width:800px;
margin:10px auto;
padding:12px;
border-radius:12px;
animation:popIn 0.25s ease;
}

@keyframes popIn {
from {opacity:0; transform:scale(0.95) translateY(10px);}
to {opacity:1; transform:scale(1) translateY(0);}
}

.user {background:#444654;}
.bot {background:#3a3b45;}

.input-area {
display:flex;
padding:10px;
border-top:1px solid #444;
}

input {
flex:1;
padding:12px;
border-radius:6px;
border:none;
}

button {
margin-left:10px;
padding:10px;
border:none;
border-radius:6px;
background:#19c37d;
color:white;
cursor:pointer;
}

#suggestions button {
margin:5px;
background:#555;
}

.status, .counter {
font-size:12px;
text-align:center;
margin-top:5px;
}

img {
max-width:100%;
border-radius:10px;
margin-top:10px;
}

/* typing dots */
.dot {
height:6px;
width:6px;
margin:0 2px;
background:white;
border-radius:50%;
display:inline-block;
animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes blink {
0%{opacity:0.2;}
50%{opacity:1;}
100%{opacity:0.2;}
}
</style>
</head>

<body onload="initApp()">

<div class="sidebar">
<button class="new-chat" onclick="newChat()">+ New Chat</button>
<button onclick="downloadChat()">⬇ Download</button>
<button onclick="clearChat()">🧹 Clear</button>
<div id="history" class="history"></div>
<div id="status" class="status"></div>
<div id="counter" class="counter"></div>
</div>

<div class="main">
<div class="header">🤖 LuminaAI Ultra</div>

<div id="mood" style="text-align:center;font-size:12px;color:#aaa;">
Mood: neutral
</div>

<div id="chat" class="chat-box"></div>

<div id="typing" style="display:none;text-align:center;">
<span class="dot"></span><span class="dot"></span><span class="dot"></span>
</div>

<div id="suggestions"></div>

<div class="input-area">
<button onclick="startListening()">🎤</button>
<button onclick="generateImage()">🖼</button>
<input id="message" placeholder="Type..." oninput="playTypingSound()" />
<button onclick="sendMessage()">Send</button>
</div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("chats")||"[]");
let currentChat = [];

// INIT
function initApp(){
    showSuggestions();
    updateStatus();
    loadTheme();
    renderHistory();
    updateCounter();
}

// SAVE
function save(){
localStorage.setItem("chats",JSON.stringify(chats));
updateCounter();
}

// NEW CHAT
function newChat(){
if(currentChat.length>0){chats.push(currentChat);save();}
currentChat=[];
document.getElementById("chat").innerHTML="";
renderHistory();
updateCounter();
}

// CLEAR
function clearChat(){
currentChat=[];
document.getElementById("chat").innerHTML="";
save();
updateCounter();
}

// HISTORY
function renderHistory(){
let h=document.getElementById("history");
h.innerHTML="";
chats.forEach((c,i)=>{
let d=document.createElement("div");
d.innerText="Chat "+(i+1);
d.onclick=()=>loadChat(i);
h.appendChild(d);
});
}

// LOAD CHAT
function loadChat(i){
currentChat=chats[i];
document.getElementById("chat").innerHTML="";
currentChat.forEach(m=>addMessage(m.text,m.sender));
updateCounter();
}

// ENTER KEY
document.getElementById("message").addEventListener("keypress", function(e){
if(e.key==="Enter"){e.preventDefault();sendMessage();}
});

// SEND MESSAGE
function sendMessage(){
let input=document.getElementById("message");
let msg=input.value.trim();
if(!msg) return;

addMessage(msg,"user");
currentChat.push({text:msg,sender:"user"});
save();

input.value="";
document.getElementById("typing").style.display="block";

// FETCH
fetch("/chat", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({message: msg})
})
.then(res=>res.json())
.then(data=>{
currentMood = data.mood || "neutral";
document.getElementById("mood").innerText = "Mood: " + currentMood;

setTimeout(()=>{
document.getElementById("typing").style.display="none";
handleBotReply(data.reply || "...");
},500);
})
.catch(()=>{
document.getElementById("typing").style.display="none";
handleBotReply("⚠ Server error!");
});
}

// 🧠 FIXED BOT FLOW
function handleBotReply(text){
typeEffect(text);
currentChat.push({text:text,sender:"bot"});
save();
speak(text);
}

// 🖼 IMAGE FIXED (no overwrite issues)
function generateImage(){
let userPrompt = prompt("Enter image prompt:");
if(!userPrompt) return;

let url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(userPrompt);

addMessage(`🖼 <b>${userPrompt}</b><br><img src="${url}">`,"bot");
}

// TYPE EFFECT FIXED
function typeEffect(text){
if(!text) text="...";

let chat=document.getElementById("chat");
let div=document.createElement("div");
div.classList.add("message","bot");

chat.appendChild(div);

let i=0;
let temp="";

let interval=setInterval(()=>{
temp+=text[i];
div.innerHTML=marked.parse(temp);
i++;

chat.scrollTop=chat.scrollHeight;

if(i>=text.length){
clearInterval(interval);
updateCounter();
}
},15);
}

// ADD MESSAGE
function addMessage(text,sender){
let chat=document.getElementById("chat");
let div=document.createElement("div");
div.classList.add("message",sender);

div.innerHTML=marked.parse(text);

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

// COUNTER
function updateCounter(){
document.getElementById("counter").innerText="Messages: "+currentChat.length;
}

// VOICE
function startListening(){
if(!("webkitSpeechRecognition" in window)){
alert("Voice not supported");
return;
}
let r=new webkitSpeechRecognition();
r.lang="en-IN";
r.start();
r.onresult=e=>{
document.getElementById("message").value=e.results[0][0].transcript;
sendMessage();
};
}

// SPEAK
function speak(text){
let s=new SpeechSynthesisUtterance(text);
s.lang="en-IN";
speechSynthesis.speak(s);
}
</script>

</body>
</html>
